<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond vert -->
  <rect width="512" height="512" rx="80" fill="#2D6A4F"/>
  
  <!-- Feuille de papier -->
  <rect x="120" y="80" width="272" height="352" rx="20" fill="#ffffff" opacity="0.95"/>
  
  <!-- Lignes de texte -->
  <rect x="160" y="150" width="192" height="16" rx="8" fill="#2D6A4F" opacity="0.4"/>
  <rect x="160" y="190" width="160" height="16" rx="8" fill="#2D6A4F" opacity="0.4"/>
  <rect x="160" y="230" width="180" height="16" rx="8" fill="#2D6A4F" opacity="0.4"/>
  <rect x="160" y="270" width="140" height="16" rx="8" fill="#2D6A4F" opacity="0.4"/>

  <!-- Crayon (corps) -->
  <g transform="rotate(-35, 320, 340)">
    <rect x="290" y="250" width="40" height="130" rx="6" fill="#F4C430"/>
    <!-- Gomme -->
    <rect x="290" y="245" width="40" height="22" rx="4" fill="#e8a0a0"/>
    <!-- Bague métal -->
    <rect x="290" y="264" width="40" height="8" fill="#aaa"/>
    <!-- Pointe -->
    <polygon points="290,380 330,380 310,420" fill="#d4a84b"/>
    <!-- Mine -->
    <polygon points="302,405 318,405 310,420" fill="#333"/>
  </g>

  <!-- Étoile XP en bas à droite -->
  <circle cx="390" cy="390" r="55" fill="#F4C430"/>
  <text x="390" y="406" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#1b4332">XP</text>
</svg>
